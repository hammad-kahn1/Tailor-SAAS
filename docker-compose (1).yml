version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: tailor_saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tailor_saas}
      MYSQL_USER: ${DB_USERNAME:-tailor_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tailor_net]

  redis:
    image: redis:7-alpine
    container_name: tailor_saas_redis
    restart: unless-stopped
    networks: [tailor_net]

  mailhog:
    image: mailhog/mailhog
    container_name: tailor_saas_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025" # web UI to view sent emails in dev
    networks: [tailor_net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tailor_saas_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    entrypoint: ["/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [tailor_net]

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tailor_saas_queue
    restart: unless-stopped
    env_file: ./backend/.env
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - backend
    networks: [tailor_net]

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tailor_saas_scheduler
    restart: unless-stopped
    env_file: ./backend/.env
    # Runs `php artisan schedule:run` every minute (delivery/payment reminders).
    entrypoint: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - backend
    networks: [tailor_net]

  nginx-api:
    image: nginx:1.27-alpine
    container_name: tailor_saas_nginx_api
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks: [tailor_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: tailor_saas_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - nginx-api
    networks: [tailor_net]

networks:
  tailor_net:
    driver: bridge

volumes:
  mysql_data:
  backend_storage:
